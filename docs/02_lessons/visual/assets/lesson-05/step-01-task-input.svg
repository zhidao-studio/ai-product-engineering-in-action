<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="60" y="64" font-size="34" font-family="Arial" font-weight="700" fill="#111827">第 5 课：AI 编码任务输入标准</text>
  <text x="60" y="102" font-size="18" font-family="Arial" fill="#64748b">不是“帮我做完整小程序”，而是“只完成一个任务，并限制修改范围”</text>
  <rect x="70" y="145" width="760" height="500" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="100" y="190" font-size="24" font-family="Arial" font-weight="700" fill="#111827">TASK-002：实现首页地点列表</text>
  <g font-family="Arial" font-size="18" fill="#111827">
    <text x="100" y="240" font-weight="700">目标：</text>
    <text x="170" y="240">在首页展示 mock 地点数据。</text>
    <text x="100" y="292" font-weight="700">允许修改：</text>
    <text x="220" y="292">pages/home/</text>
    <text x="220" y="322">services/placeService.js</text>
    <text x="220" y="352">mock/places.js</text>
    <text x="100" y="405" font-weight="700">禁止修改：</text>
    <text x="220" y="405">app.json、其他页面、第三方依赖、登录/后端/地图/支付</text>
    <text x="100" y="458" font-weight="700">验收标准：</text>
    <text x="220" y="458">首页能显示地点列表</text>
    <text x="220" y="488">点击地点能进入详情页</text>
    <text x="220" y="518">空数据时有空状态</text>
    <text x="220" y="548">完成后输出修改文件、验证方式和风险点</text>
  </g>
  <rect x="875" y="145" width="330" height="500" rx="18" fill="#eef2ff" stroke="#818cf8"/>
  <text x="905" y="190" font-size="24" font-family="Arial" font-weight="700" fill="#111827">学员检查</text>
  <g font-family="Arial" font-size="18" fill="#111827">
    <text x="905" y="245">□ 是否只做一个任务？</text>
    <text x="905" y="290">□ 允许修改是否清楚？</text>
    <text x="905" y="335">□ 禁止修改是否清楚？</text>
    <text x="905" y="380">□ 是否有验收标准？</text>
    <text x="905" y="425">□ AI 是否改了无关文件？</text>
    <text x="905" y="470">□ 是否说明验证方式？</text>
  </g>
  <rect x="905" y="530" width="260" height="66" rx="12" fill="#111827"/>
  <text x="930" y="560" font-size="18" font-family="Arial" font-weight="700" fill="#ffffff">连续修 3 次还不对？</text>
  <text x="930" y="586" font-size="15" font-family="Arial" fill="#e5e7eb">停下来，回到任务定义</text>
  <path d="M830 395 L875 395" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
</svg>
