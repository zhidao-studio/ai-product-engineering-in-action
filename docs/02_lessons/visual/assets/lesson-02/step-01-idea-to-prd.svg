<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="56" y="64" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#111827">第 2 课：从一句想法到项目总说明 / PRD</text>
  <text x="56" y="102" font-size="18" font-family="Arial, sans-serif" fill="#64748b">核心判断：AI 输出必须能回答“给谁用、解决什么、第一版做什么、不做什么、怎么验收”</text>
  <rect x="70" y="150" width="330" height="430" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="95" y="190" font-size="22" font-family="Arial" font-weight="700" fill="#111827">① 起始输入</text>
  <rect x="95" y="220" width="280" height="96" rx="12" fill="#f1f5f9"/>
  <text x="115" y="252" font-size="17" font-family="Arial" fill="#111827">我想做一个小程序，</text>
  <text x="115" y="280" font-size="17" font-family="Arial" fill="#111827">帮大家收藏适合钓鱼</text>
  <text x="115" y="308" font-size="17" font-family="Arial" fill="#111827">和露营的地点。</text>
  <line x1="95" y1="355" x2="375" y2="355" stroke="#e2e8f0"/>
  <text x="95" y="390" font-size="18" font-family="Arial" font-weight="700" fill="#111827">复制提示词</text>
  <text x="95" y="422" font-size="16" font-family="Arial" fill="#475569">prompts/chatgpt/</text>
  <text x="95" y="448" font-size="16" font-family="Arial" fill="#475569">01_product_brief_prompt.md</text>
  <rect x="430" y="150" width="390" height="430" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="455" y="190" font-size="22" font-family="Arial" font-weight="700" fill="#111827">② AI 输出</text>
  <text x="455" y="230" font-size="18" font-family="Arial" font-weight="700" fill="#111827">项目总说明</text>
  <text x="455" y="264" font-size="16" font-family="Arial" fill="#475569">目标用户：上海周边周末户外用户</text>
  <text x="455" y="294" font-size="16" font-family="Arial" fill="#475569">用户痛点：地点信息分散，不易收藏</text>
  <text x="455" y="324" font-size="16" font-family="Arial" fill="#475569">第一版做：列表、详情、收藏、设置</text>
  <text x="455" y="354" font-size="16" font-family="Arial" fill="#475569">第一版不做：登录、地图、后端、支付</text>
  <line x1="455" y1="385" x2="790" y2="385" stroke="#e2e8f0"/>
  <text x="455" y="424" font-size="18" font-family="Arial" font-weight="700" fill="#111827">产品需求文档</text>
  <text x="455" y="458" font-size="16" font-family="Arial" fill="#475569">F001 首页地点列表：能看到地点</text>
  <text x="455" y="486" font-size="16" font-family="Arial" fill="#475569">F002 详情页：能查看地点说明</text>
  <text x="455" y="514" font-size="16" font-family="Arial" fill="#475569">F003 收藏：能收藏和取消收藏</text>
  <rect x="850" y="150" width="360" height="430" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="875" y="190" font-size="22" font-family="Arial" font-weight="700" fill="#111827">③ 学员检查</text>
  <g font-family="Arial" font-size="17" fill="#111827">
    <text x="875" y="235">□ 目标用户是否具体？</text>
    <text x="875" y="275">□ 第一版是否不超过 5 页？</text>
    <text x="875" y="315">□ 是否写清楚不做什么？</text>
    <text x="875" y="355">□ 验收标准能不能检查？</text>
    <text x="875" y="395">□ 语言非技术用户能否看懂？</text>
  </g>
  <rect x="875" y="440" width="300" height="72" rx="12" fill="#111827"/>
  <text x="900" y="472" font-size="18" font-family="Arial" font-weight="700" fill="#ffffff">范围太大怎么办？</text>
  <text x="900" y="500" font-size="15" font-family="Arial" fill="#e5e7eb">要求 AI 压缩到第一版可运行样例</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
  <path d="M400 365 L430 365" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M820 365 L850 365" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
