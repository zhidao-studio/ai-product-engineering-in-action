<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <text x="60" y="70" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#111827">第 1 课：AI 产品工程不是魔法，是流程</text>
  <text x="60" y="108" font-size="18" font-family="Arial, sans-serif" fill="#6b7280">学员要看到的是一条可控制、可验收、可迭代的路径</text>
  <g font-family="Arial, sans-serif" font-size="19" font-weight="600">
    <rect x="70" y="170" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="105" y="214" fill="#111827">产品想法</text>
    <rect x="285" y="170" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="320" y="214" fill="#111827">想法验证</text>
    <rect x="500" y="170" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="526" y="214" fill="#111827">项目总说明</text>
    <rect x="715" y="170" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="742" y="214" fill="#111827">产品需求文档</text>
    <rect x="930" y="170" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="970" y="214" fill="#111827">页面清单</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M240 206 L285 206"/>
    <path d="M455 206 L500 206"/>
    <path d="M670 206 L715 206"/>
    <path d="M885 206 L930 206"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="19" font-weight="600">
    <rect x="930" y="330" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="970" y="374" fill="#111827">用户流程</text>
    <rect x="715" y="330" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="756" y="374" fill="#111827">AI 规则</text>
    <rect x="500" y="330" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="545" y="374" fill="#111827">任务清单</text>
    <rect x="285" y="330" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="320" y="374" fill="#111827">AI 编码</text>
    <rect x="70" y="330" width="170" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="105" y="374" fill="#111827">代码审查</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M1015 242 L1015 330"/>
    <path d="M930 366 L885 366"/>
    <path d="M715 366 L670 366"/>
    <path d="M500 366 L455 366"/>
    <path d="M285 366 L240 366"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="19" font-weight="600">
    <rect x="70" y="490" width="210" height="76" rx="14" fill="#eef2ff" stroke="#818cf8"/>
    <text x="110" y="535" fill="#111827">运行验证</text>
    <rect x="330" y="490" width="230" height="76" rx="14" fill="#eef2ff" stroke="#818cf8"/>
    <text x="372" y="535" fill="#111827">模拟用户验收</text>
    <rect x="610" y="490" width="230" height="76" rx="14" fill="#ecfdf5" stroke="#34d399"/>
    <text x="650" y="535" fill="#111827">真实用户试用</text>
    <rect x="890" y="490" width="210" height="76" rx="14" fill="#ecfdf5" stroke="#34d399"/>
    <text x="940" y="535" fill="#111827">版本迭代</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M155 402 L155 490"/>
    <path d="M280 528 L330 528"/>
    <path d="M560 528 L610 528"/>
    <path d="M840 528 L890 528"/>
  </g>
  <rect x="840" y="600" width="350" height="68" rx="12" fill="#111827"/>
  <text x="865" y="630" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">标注：每一步都有输入和产物</text>
  <text x="865" y="656" font-size="16" font-family="Arial, sans-serif" fill="#d1d5db">不是让 AI 自由发挥，而是按流程交付</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
</svg>
