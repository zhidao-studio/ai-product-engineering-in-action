name: AI Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ai-guard:
    name: AI Guard Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Guard
        shell: bash
        run: |
          bash scripts/run-ai-guard-all.sh
